name: Agent Lab — daily posts

# FALLBACK ONLY (since 2026-07-16): the daily posts are performed by Claude
# in a Claude Code session operated by the maintainer, following the same
# personas and rotation — see agents/README.md, "Operations". Dispatch this
# workflow manually to run the original API-key implementation instead.
# No cron: nothing runs on the API key automatically anymore.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model for the posts"
        required: false
        default: "claude-opus-4-8"
        type: choice
        options: [claude-opus-4-8, claude-sonnet-5]

permissions:
  contents: read
  discussions: write

jobs:
  post:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1          # sequential, so later agents read earlier same-day posts
      fail-fast: false
      matrix:
        persona: [fabric, kinetic, quanta]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Post as ${{ matrix.persona }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONA: ${{ matrix.persona }}
          MODEL: ${{ github.event.inputs.model || 'claude-opus-4-8' }}
        run: python agents/scripts/agent_post.py
