name: Agent Lab — review vote on a draft note

# Runs the 2-of-3 agent vote on any human-opened or updated draft-note PR.
# (Bot-opened weekly PRs are voted on inside the weekly workflow itself.)

on:
  pull_request:
    paths:
      - "notes/drafts/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Three-agent review vote
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          MODEL: claude-sonnet-5
        run: python agents/scripts/agent_review.py
