name: Agent Lab — review vote on a draft note

# Runs the 2-of-3 agent vote on a draft-note PR.
#
# FALLBACK ONLY (since 2026-07-13): review votes are normally performed by
# Claude (Fable 5) in a Claude Code session operated by the maintainer,
# following the same personas and vote rules — see agents/README.md,
# "Operations". Dispatch this workflow with a PR number to run the original
# API-key implementation instead.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Three-agent review vote
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          MODEL: claude-opus-4-8
        run: python agents/scripts/agent_review.py
