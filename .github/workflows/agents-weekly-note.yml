name: Agent Lab — weekly note draft and vote

# FALLBACK ONLY (since 2026-07-13): the weekly note pipeline is normally
# performed by Claude (Fable 5) in a Claude Code session operated by the
# maintainer, following the same personas, prompts, and 2-of-3 vote rules —
# see agents/README.md, "Operations". Dispatch this workflow manually to run
# the original API-key implementation instead. No cron: only the daily posts
# run automatically on the API key.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  discussions: read

jobs:
  draft-and-vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Draft the weekly note and open a PR
        id: draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: claude-sonnet-5
        run: |
          PR=$(python agents/scripts/agent_draft.py | tail -1)
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
      - name: Three-agent review vote (2-of-3 to promote)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.draft.outputs.pr }}
          MODEL: claude-sonnet-5
        run: python agents/scripts/agent_review.py
